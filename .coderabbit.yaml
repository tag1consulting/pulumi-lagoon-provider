language: "en-US"
early_access: true
reviews:
  profile: "chill"
  request_changes_workflow: true
  sequence_diagrams: true
  high_level_summary: true
  high_level_summary_in_walkthrough: true
  related_issues: true
  related_prs: true
  assess_linked_issues: true
  estimate_code_review_effort: true
  review_details: true
  auto_review:
    enabled: true
    drafts: false
    ignore_usernames:
      - "dependabot[bot]"
chat:
  auto_reply: true
tone_instructions: "Provide architectural insights on system design, scalability, and long-term maintainability. Only flag issues that would cause bugs, security problems, or significant maintainability concerns. Do not raise style nitpicks."
