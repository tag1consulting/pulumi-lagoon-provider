version: 2

before:
  hooks:
    - cd provider && go mod tidy

builds:
  - id: pulumi-resource-lagoon
    dir: provider
    main: ./cmd/pulumi-resource-lagoon
    binary: pulumi-resource-lagoon
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.Version={{.Version}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: archive
    format: tar.gz
    name_template: "pulumi-resource-lagoon-v{{ .Version }}-{{ .Os }}-{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
