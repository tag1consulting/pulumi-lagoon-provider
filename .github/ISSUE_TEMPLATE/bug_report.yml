name: Bug Report
description: Report a bug in the Pulumi Lagoon provider
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill in the details below to help us reproduce and fix the issue.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Minimal resource configuration and commands to reproduce the issue.
      placeholder: |
        ```python
        from pulumi_lagoon import Project, ProjectArgs

        project = Project("example", ProjectArgs(
            name="example",
            ...
        ))
        ```

        ```bash
        pulumi up
        ```
    validations:
      required: true

  - type: textarea
    id: error-output
    attributes:
      label: Error Output
      description: |
        Full error output from `pulumi up` or `pulumi preview`.
        **Important: redact any tokens, passwords, API keys, or other secrets before pasting.**
      render: shell

  - type: input
    id: provider-version
    attributes:
      label: Provider Version
      description: "Output of `pulumi plugin ls | grep lagoon`"
      placeholder: "0.3.0"
    validations:
      required: true

  - type: input
    id: pulumi-version
    attributes:
      label: Pulumi Version
      description: "Output of `pulumi version`"
      placeholder: "v3.165.0"
    validations:
      required: true

  - type: input
    id: lagoon-version
    attributes:
      label: Lagoon Version
      description: "Version of the Lagoon instance you're targeting (if known)"
      placeholder: "v2.31.0"

  - type: dropdown
    id: sdk-language
    attributes:
      label: SDK Language
      options:
        - Python
        - TypeScript/JavaScript
        - Go
        - .NET/C#
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other relevant information (OS, environment, workarounds tried, etc.)
