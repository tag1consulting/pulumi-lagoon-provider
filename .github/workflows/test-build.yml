name: Test Build (PRs)

on:
  pull_request:
    branches: [develop, main]

permissions:
  contents: read

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Copy README into SDK package directory
        run: cp README.md sdk/python/README.md

      - name: Build package
        run: python -m build
        working-directory: sdk/python

      - name: Check package
        run: twine check dist/*
        working-directory: sdk/python

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: sdk/python/dist/

  build-nodejs:
    name: Build Node.js distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm ci
        working-directory: sdk/nodejs

      - name: Build (compile TypeScript)
        run: npm run build
        working-directory: sdk/nodejs

      - name: Upload Node.js artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-nodejs
          path: |
            sdk/nodejs/bin/
            sdk/nodejs/package.json
            sdk/nodejs/README.md
            sdk/nodejs/LICENSE

  test-install:
    name: Test installation
    needs: build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.9', '3.11', '3.12']
    steps:
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Install from wheel
        run: pip install dist/*.whl

      - name: Test import
        run: |
          python -c "import pulumi_lagoon; print('Successfully imported pulumi_lagoon')"
          python -c "from pulumi_lagoon.lagoon import (Project, Environment, Variable, DeployTarget, DeployTargetConfig, Group, Task, NotificationSlack, NotificationRocketChat, NotificationEmail, NotificationMicrosoftTeams, ProjectNotification); print('All 12 resource types importable')"

  test-install-nodejs:
    name: Test Node.js installation
    needs: build-nodejs
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ['22', '24']
    steps:
      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist-nodejs
          path: sdk/nodejs/

      - name: Pack and install
        run: |
          TGZ=$(npm pack)
          mkdir -p /tmp/test-install
          cd /tmp/test-install
          npm install $GITHUB_WORKSPACE/sdk/nodejs/$TGZ
        working-directory: sdk/nodejs

      - name: Test require
        run: node -e "const lagoon = require('@tag1consulting/pulumi-lagoon'); console.log('Successfully loaded:', Object.keys(lagoon).length, 'exports');"
        working-directory: /tmp/test-install

  build-dotnet:
    name: Build .NET distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0'

      - name: Build package
        run: dotnet build -c Release
        working-directory: sdk/dotnet

      - name: Pack
        run: dotnet pack -c Release -o dist/
        working-directory: sdk/dotnet

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-dotnet
          path: sdk/dotnet/dist/

  test-go-sdk:
    name: Verify Go SDK compiles
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - name: Build and vet Go SDK
        run: go build ./... && go vet ./...
        working-directory: sdk/go/lagoon
