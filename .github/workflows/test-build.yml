name: Test Build (PRs)

on:
  pull_request:
    branches: [develop, main]

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Copy README into SDK package directory
        run: cp README.md sdk/python/README.md

      - name: Build package
        run: python -m build
        working-directory: sdk/python

      - name: Check package
        run: twine check dist/*
        working-directory: sdk/python

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: sdk/python/dist/

  test-install:
    name: Test installation
    needs: build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.9', '3.11', '3.12']
    steps:
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Install from wheel
        run: pip install dist/*.whl

      - name: Test import
        run: |
          python -c "import pulumi_lagoon; print('Successfully imported pulumi_lagoon')"
          python -c "from pulumi_lagoon.lagoon import Project, Environment, Variable; print('All resources importable')"
