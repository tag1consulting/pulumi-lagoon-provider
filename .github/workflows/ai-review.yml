name: AI PR Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, labeled]
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch, tag, or commit SHA to review (default: main)"
        required: false
        default: main
      pr_number:
        description: "PR number (optional — looked up automatically from ref if omitted)"
        required: false
      review_mode:
        description: Review mode
        required: false
        default: quick
        type: choice
        options: [quick, full]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    concurrency:
      group: ai-review-${{ github.event.pull_request.number || inputs.pr_number || inputs.ref }}
      cancel-in-progress: true
    if: >-
      (github.event_name == 'workflow_dispatch') ||
      (github.event_name == 'pull_request' &&
       github.event.pull_request.draft == false &&
       github.actor != 'dependabot[bot]' &&
       github.actor != 'renovate[bot]' &&
       !contains(github.event.pull_request.labels.*.name, 'skip-ai-review') &&
       (github.event.action != 'labeled' || github.event.label.name == 'ai-review-full'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ inputs.ref || github.event.pull_request.head.sha || github.sha }}

      # For workflow_dispatch: resolve PR number from ref when not supplied directly.
      # Resolves a branch name or SHA to the open PR targeting the default branch.
      - name: Resolve PR number
        id: resolve-pr
        if: github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INPUT_PR_NUMBER: ${{ inputs.pr_number }}
          INPUT_REF: ${{ inputs.ref }}
        run: |
          if [[ -n "$INPUT_PR_NUMBER" ]]; then
            echo "pr_number=$INPUT_PR_NUMBER" >> "$GITHUB_OUTPUT"
            base_ref=$(gh pr view "$INPUT_PR_NUMBER" --json baseRefName --jq '.baseRefName')
            head_sha=$(gh pr view "$INPUT_PR_NUMBER" --json headRefOid --jq '.headRefOid')
            echo "base_ref=${base_ref}" >> "$GITHUB_OUTPUT"
            echo "head_sha=${head_sha}" >> "$GITHUB_OUTPUT"
          else
            # Resolve the ref to a commit SHA, then find the open PR for it
            head_sha=$(git rev-parse HEAD)
            echo "head_sha=${head_sha}" >> "$GITHUB_OUTPUT"
            pr_json=$(gh pr list --state open --json number,baseRefName,headRefOid \
              --jq ".[] | select(.headRefOid | startswith(\"${head_sha:0:7}\"))" | head -1)
            if [[ -z "$pr_json" ]]; then
              # Fall back: find any open PR whose head branch matches the ref input
              pr_json=$(gh pr list --state open --head "$INPUT_REF" \
                --json number,baseRefName,headRefOid | jq '.[0]')
            fi
            if [[ -z "$pr_json" || "$pr_json" == "null" ]]; then
              echo "ERROR: No open PR found for ref '${INPUT_REF}' (${head_sha:0:7}). Create a PR first or pass pr_number directly." >&2
              exit 1
            fi
            echo "pr_number=$(echo "$pr_json" | jq -r '.number')" >> "$GITHUB_OUTPUT"
            echo "base_ref=$(echo "$pr_json" | jq -r '.baseRefName')" >> "$GITHUB_OUTPUT"
          fi

      - name: Mask action repo token
        if: ${{ !(github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork) }}
        run: echo "::add-mask::${{ secrets.AI_PR_REVIEW_TOKEN }}"

      - uses: actions/checkout@v6
        if: ${{ !(github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork) }}
        with:
          repository: tag1consulting/ai-pr-review
          ref: main
          token: ${{ secrets.AI_PR_REVIEW_TOKEN }}
          persist-credentials: false
          path: .ai-pr-review

      - name: Skip AI review (fork PR — AI_PR_REVIEW_TOKEN unavailable)
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork
        run: echo "Skipping AI review for fork PR — repository secrets are unavailable in this context."

      - uses: ./.ai-pr-review
        if: ${{ !(github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork) }}
        with:
          provider: ${{ vars.AI_REVIEW_PROVIDER || 'bedrock-proxy' }}
          api-key: ${{ secrets.AI_REVIEW_API_KEY || secrets.TAG1_BEDROCK_API_KEY }}
          base-url: ${{ vars.AI_REVIEW_BASE_URL || '' }}
          model-standard: ${{ vars.AI_REVIEW_MODEL_STANDARD || '' }}
          model-premium: ${{ vars.AI_REVIEW_MODEL_PREMIUM || '' }}
          review-mode: >-
            ${{
              inputs.review_mode ||
              (contains(github.event.pull_request.labels.*.name, 'ai-review-full') && 'full') ||
              'quick'
            }}
          pr-number: ${{ steps.resolve-pr.outputs.pr_number || github.event.pull_request.number }}
          base-ref: ${{ steps.resolve-pr.outputs.base_ref || github.event.pull_request.base.ref || github.event.repository.default_branch }}
          head-sha: ${{ steps.resolve-pr.outputs.head_sha || github.event.pull_request.head.sha || github.sha }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
