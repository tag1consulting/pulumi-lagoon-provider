name: AI PR Review

# pull_request_target runs the workflow from the base branch so that secrets
# and repo variables are available even for fork PRs. This is safe only as
# long as the AI review action treats the checked-out code as untrusted data
# and never executes it. That guarantee is documented as an explicit invariant
# of tag1consulting/ai-pr-review (SECURITY.md → "Security invariants").
#
# Defense-in-depth: this workflow additionally gates on author_association
# (OWNER/MEMBER/COLLABORATOR), so a fork PR from an arbitrary actor will not
# trigger a secret-bearing run even if the action invariant ever regressed.
# Mirror of the gate already used by ai-review-commands.yml for slash commands.
#
# Note: tag1consulting/ai-pr-review/container-action@main is intentionally a
# mutable ref. This is a dogfooding/canary repo and we own the action; the
# mutable-ref supply-chain risk is accepted, with the action invariant above
# as the load-bearing mitigation.
on:
  pull_request_target:
    types: [opened, synchronize, ready_for_review]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  review:
    if: |
      !github.event.pull_request.draft &&
      github.actor != 'dependabot[bot]' &&
      github.actor != 'renovate[bot]' &&
      !contains(github.event.pull_request.labels.*.name, 'skip-ai-review') &&
      contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.pull_request.author_association)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Run AI review
        uses: tag1consulting/ai-pr-review/container-action@main
        with:
          # vars.AI_REVIEW_IMAGE_TAG pins the container image (default 'latest';
          # this repo dogfoods 'dev' ahead of general availability).
          image-tag: ${{ vars.AI_REVIEW_IMAGE_TAG || 'latest' }}
          provider: ${{ vars.AI_REVIEW_PROVIDER || 'bedrock-proxy' }}
          api-key: ${{ secrets.AI_REVIEW_API_KEY || secrets.TAG1_BEDROCK_API_KEY }}
          base-url: ${{ vars.AI_REVIEW_BASE_URL || '' }}
          model-standard: ${{ vars.AI_REVIEW_MODEL_STANDARD || '' }}
          model-premium: ${{ vars.AI_REVIEW_MODEL_PREMIUM || '' }}
          github-token: ${{ github.token }}
          pr-number: ${{ github.event.pull_request.number }}
          base-ref: ${{ github.event.pull_request.base.ref }}
          head-sha: ${{ github.event.pull_request.head.sha }}
          review-mode: 'quick'
          enable-suggestions: 'true'
          # vars.AI_REVIEW_IGNORE_MERGE_COMMITS strips upstream base-branch
          # merge commits before diffing (default false).
          ignore-merge-commits: ${{ vars.AI_REVIEW_IGNORE_MERGE_COMMITS || 'false' }}
          # --- Opt-in capabilities (Python engine only, which is the sole
          # engine since v2.0.0 removed the bash engine) ---
          # vars.AI_REVIEW_CONTEXT_ENRICHMENT injects tree-sitter symbol
          # context into agent prompts (default false).
          context-enrichment: ${{ vars.AI_REVIEW_CONTEXT_ENRICHMENT || 'false' }}
          # vars.AI_REVIEW_FEEDBACK_LOOP loads recent /ai-pr-review feedback
          # entries from the ai-pr-review-bot branch (default false).
          feedback-loop: ${{ vars.AI_REVIEW_FEEDBACK_LOOP || 'false' }}
