name: AI PR Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review]
  workflow_dispatch:
    inputs:
      review_mode:
        description: 'Review mode'
        default: 'quick'
        type: choice
        options: [quick, full]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    concurrency:
      group: ai-review-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    if: >-
      github.event.pull_request.draft == false &&
      github.actor != 'dependabot[bot]' &&
      github.actor != 'renovate[bot]' &&
      !contains(github.event.pull_request.labels.*.name, 'skip-ai-review')
    runs-on: ubuntu-latest
    env:
      # --- Required: choose ONE provider and uncomment its credentials ---

      # Option 1: Anthropic direct (https://console.anthropic.com)
      AI_PROVIDER: anthropic
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      # Option 2: OpenAI (https://platform.openai.com)
      # AI_PROVIDER: openai
      # OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      # Option 3: Google Gemini (https://aistudio.google.com)
      # AI_PROVIDER: google
      # GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}

      # Option 4: OpenAI-compatible endpoint (vLLM, Ollama, Azure OpenAI, etc.)
      # AI_PROVIDER: openai-compatible
      # OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      # OPENAI_BASE_URL: https://your-endpoint.example.com/v1
      # AI_MODEL_STANDARD: your-model-name

      # Option 5: Tag1 Bedrock proxy
      # AI_PROVIDER: bedrock-proxy
      # BEDROCK_API_URL: https://openwebui-proxy.tag1.io/bedrock
      # BEDROCK_API_KEY: ${{ secrets.TAG1_BEDROCK_API_KEY }}

      # --- Optional: override model selection ---
      # AI_MODEL_STANDARD: claude-sonnet-4-6-20250514   # for standard agents
      # AI_MODEL_PREMIUM: claude-opus-4-6-20250514       # for deep analysis (full mode)

      # --- GitHub (set automatically) ---
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GITHUB_REPOSITORY: ${{ github.repository }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck

      - name: Run AI review
        run: bash .github/ai-review/review.sh
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          BASE_REF: ${{ github.event.pull_request.base.ref }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          # Full mode: add "ai-review-full" label to the PR, or trigger via workflow_dispatch
          AI_REVIEW_MODE: >-
            ${{ contains(github.event.pull_request.labels.*.name, 'ai-review-full')
                && 'full'
                || inputs.review_mode
                || 'quick' }}
