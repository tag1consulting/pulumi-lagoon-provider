---
layout: default
---

<div class="hero">
  <img src="{{ '/assets/images/lagoon-provider-logo.svg' | relative_url }}" alt="Pulumi Lagoon Provider" class="hero-logo" />
  <h1>{{ page.hero_title | default: site.title }}</h1>
  <p class="tagline">{{ page.hero_tagline | default: site.description }}</p>
  <div class="hero-actions">
    <a href="{{ '/getting-started' | relative_url }}" class="btn-hero">Get Started</a>
    <a href="{{ site.gh_repository_url }}" class="btn-hero-secondary" target="_blank" rel="noopener">View on GitHub</a>
  </div>
</div>

{{ content }}
