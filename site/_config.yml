title: Pulumi Lagoon Provider
description: "Manage Lagoon hosting platform resources as infrastructure-as-code with Pulumi"
theme: just-the-docs

url: "https://tag1consulting.github.io"
baseurl: "/pulumi-lagoon-provider"

color_scheme: tag1

logo: "/assets/images/tag1-logo.svg"
favicon_ico: "/assets/images/favicon.ico"

search_enabled: true
search:
  heading_level: 2
  previews: 3
  preview_words_before: 5
  preview_words_after: 10

heading_anchors: true

gh_repository_url: "https://github.com/tag1consulting/pulumi-lagoon-provider"

aux_links:
  "View on GitHub":
    - "https://github.com/tag1consulting/pulumi-lagoon-provider"
aux_links_new_tab: true

gh_edit_link: true
gh_edit_link_text: "Edit this page on GitHub"
gh_edit_repository: "https://github.com/tag1consulting/pulumi-lagoon-provider"
gh_edit_source: site
gh_edit_branch: "main"
gh_edit_view_mode: "tree"

callouts:
  warning:
    title: Warning
    color: red
  note:
    title: Note
    color: blue
  important:
    title: Important
    color: yellow
  tip:
    title: Tip
    color: green

defaults:
  - scope:
      path: ""
    values:
      layout: default

exclude:
  - Gemfile.lock
  - node_modules
  - vendor
